<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客棧點膳系統</title>
    <link rel="stylesheet" href="all.css">
    <!-- Google Fonts for Classical Style -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div class="container">
        <header>
            <h1>客棧點膳系統</h1>
            <div id="user-info" class="hidden">
                <span id="user-name"></span>
                <button id="sign-out-btn" class="btn btn-outline">告辭</button>
            </div>
        </header>
        <!-- 登入區塊 -->
        <section id="login-section">
            <div class="card login-card">
                <h2>客倌請留步</h2>
                <p>請出示通關玉牌（Google 帳號）以入內用膳</p>
                <button id="custom-login-btn" class="custom-google-btn">
                    <span class="icon"></span>
                    <span class="text">持玉牌入內</span>
                </button>
            </div>
        </section>

        <!-- 載入中 / 狀態提示 -->
        <section id="status-section" class="hidden">
            <div class="loader"></div>
            <p id="status-text">掌櫃核算中...</p>
        </section>

        <!-- 主應用程式區塊 (需登入且有權限) -->
        <main id="app-section" class="hidden">

            <!-- 管理員設定區塊 (僅管理員可見) -->
            <section id="admin-section" class="card hidden">
                <h3>📜 掌櫃告示</h3>
                <div class="admin-controls">
                    <button id="btn-clear-orders" class="btn btn-danger">銷毀今日帳冊</button>
                </div>

                <hr style="border:0; border-top: 1px dashed var(--border-color); margin: 20px 0;">
                
                <!-- 新增菜單區塊 -->
                <div id="admin-add-menu-panel" class="mt-3">
                    <h4>📝 登錄新客棧佳餚：</h4>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px;">
                        <input type="text" id="new-menu-restaurant" placeholder="客棧名稱 (如: 龍門客棧)" style="flex: 1; min-width: 140px;">
                        <input type="text" id="new-menu-name" placeholder="佳餚名稱 (如: 叫化雞)" style="flex: 1; min-width: 140px;">
                        <input type="number" id="new-menu-price" placeholder="耗費銀兩 (如: 150)" style="flex: 1; min-width: 120px;">
                        <input type="text" id="new-menu-category" placeholder="種類 (如: 主食)" style="flex: 1; min-width: 100px;">
                    </div>
                    <button id="btn-add-menu-item" class="btn btn-secondary">登錄新佳餚</button>
                </div>

                <hr style="border:0; border-top: 1px dashed var(--border-color); margin: 20px 0;">

                <div id="admin-config-panel" class="mt-3">
                    <h4>欽定今日開伙客棧：</h4>
                    <div id="restaurant-checkboxes" class="checkbox-group">
                        <p class="placeholder-text">飛鴿傳書中...</p>
                    </div>
                    <button id="btn-save-config" class="btn btn-primary mt-2">封存設定</button>
                </div>
            </section>

            <!-- 今日菜單區塊 -->
            <section id="menu-section">
                <h2>🥢 今日推薦佳餚 <span id="today-restaurants"></span></h2>
                <div id="menu-container" class="grid-container">
                    <!-- JS 動態生成餐點卡片 -->
                    <p class="placeholder-text">今日尚未開伙或菜單傳遞中...</p>
                </div>
            </section>
        </main>

        <!-- 訂單確認浮動視窗 / 底部區塊 -->
        <section id="order-summary-section" class="hidden">
            <!-- 用於顯示簡易結算或複製按鈕，可視需求擴充 -->
            <button id="btn-show-orders" class="btn btn-info">翻閱帳本總覽</button>
        </section>

    </div>

    <!-- 訂單列表 Modal -->
    <div id="orders-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            
            <h2>🧮 總計帳房</h2>
            <div class="table-wrapper" style="margin-bottom: 30px;">
                <table id="orders-summary-table">
                    <thead>
                        <tr>
                            <th>餐廳</th>
                            <th>品項</th>
                            <th>數量</th>
                            <th>小計</th>
                        </tr>
                    </thead>
                    <tbody id="orders-summary-list">
                        <!-- JS 動態生成 -->
                    </tbody>
                </table>
            </div>

            <h2>📜 點膳紀錄圖卷</h2>
            <div class="table-wrapper">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>時辰</th>
                            <th>客倌</th>
                            <th>客棧</th>
                            <th>佳餚</th>
                            <th>銀兩</th>
                            <th>客製要求</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        <!-- JS 動態生成 -->
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <p>總計銀兩: <span id="total-amount">0</span> 兩</p>
                <button id="btn-copy-orders" class="btn btn-success">抄錄帳冊 (Line)</button>
            </div>
        </div>
    </div>

    <script src="all.js"></script>
</body>

</html>
